<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تريد تتونس؟</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{

    min-height:100vh;

    background:
    radial-gradient(circle at top,#ffb6e6,#ff4fa3,#7b2cbf);

    display:flex;
    align-items:center;
    justify-content:center;

    padding:20px;

}


.card{

    width:100%;
    max-width:430px;

    background:rgba(255,255,255,.18);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.35);

    border-radius:35px;

    padding:30px;

    text-align:center;

    box-shadow:0 20px 60px rgba(100,0,80,.4);

}


.profile{

    width:280px;
    height:280px;

    object-fit:cover;

    border-radius:35px;

    border:6px solid white;

    box-shadow:0 15px 40px rgba(0,0,0,.25);

    margin-bottom:25px;

}


h1{

    color:white;

    font-size:38px;

    font-weight:900;

}


.text{

    color:white;

    font-size:17px;

    line-height:2;

    margin-top:15px;

}


.age{

    margin-top:25px;

    background:rgba(255,255,255,.2);

    padding:15px;

    border-radius:20px;

    color:white;

    font-size:21px;

    font-weight:bold;

}


.btn{

    display:block;

    margin-top:25px;

    background:linear-gradient(45deg,#ff005c,#ff4da6);

    color:white;

    text-decoration:none;

    padding:20px;

    border-radius:50px;

    font-size:23px;

    font-weight:900;

    box-shadow:0 10px 30px rgba(255,0,100,.5);

    animation:pulse 1.5s infinite;

}


.note{

    margin-top:20px;

    color:white;

    font-size:13px;

    opacity:.8;

}


@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.06);
    }

    100%{
        transform:scale(1);
    }

}

</style>

</head>


<body>


<div class="card">


<img class="profile"
src="IMG_4891.jpeg"
alt="photo">


<h1>
❤️ تريد تتونس؟
</h1>


<p class="text">
  🫦💋ابدأ سهرتك والمتعههه ة.
</p>


<div class="age">
🔞 هل عمرك 18 سنة أو أكثر؟
</div>


<a href="https://adsone.leadseagle.shop/?utm_medium=ad91ef12cbc61028dd54bd1f95ec531c80b2da20&utm_campaign=medoads1" class="btn">
🫦 اضغط لتبدأ
</a>


<div class="note">
 🫦🫦 تعارف  
</div>


</div>


</body>
</html>
