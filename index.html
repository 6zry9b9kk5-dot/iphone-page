<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تعارف وشات</title>

<style>

*{
box-sizing:border-box;
font-family:Tahoma,Arial,sans-serif;
}

body{
margin:0;
min-height:100vh;
background:
radial-gradient(circle at 20% 10%,#ff168055,transparent 35%),
radial-gradient(circle at 80% 30%,#7a00ff55,transparent 35%),
#050008;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}


/* قلوب متحركة */

.heart{
position:fixed;
bottom:-40px;
font-size:22px;
animation:rise 8s linear infinite;
opacity:.5;
}

@keyframes rise{
0%{
transform:translateY(0);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}


.box{

width:100%;
max-width:430px;

background:rgba(255,255,255,.09);
backdrop-filter:blur(20px);

border-radius:35px;
padding:25px;

box-shadow:
0 0 60px rgba(255,0,150,.35);

animation:open .8s ease;

}


@keyframes open{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}



.image{

width:100%;
height:280px;

object-fit:cover;

border-radius:30px;

box-shadow:
0 0 35px #ff4fa5;

}



.tag{

display:inline-block;

background:#ff1685;

padding:10px 20px;

border-radius:30px;

margin-top:15px;

font-weight:bold;

}



h1{

font-size:32px;

line-height:1.4;

text-align:center;

margin:20px 0 10px;

}


h1 span{

color:#ff65b7;

}



.text{

text-align:center;

color:#ddd;

line-height:1.8;

font-size:16px;

}




.form{

margin-top:25px;

}


label{

display:block;

margin-bottom:10px;

font-size:18px;

}



input{

width:100%;

padding:17px;

border-radius:20px;

border:none;

font-size:18px;

text-align:center;

outline:none;

}



button{

width:100%;

margin-top:18px;

padding:18px;

border:0;

border-radius:50px;

background:linear-gradient(45deg,#ff006f,#ff70bb);

color:white;

font-size:22px;

font-weight:bold;

cursor:pointer;

box-shadow:
0 0 30px #ff006f;

animation:pulse 2s infinite;

}


@keyframes pulse{

50%{
transform:scale(1.04);
}

}



.features{

margin-top:25px;

}



.item{

background:rgba(255,255,255,.08);

padding:14px;

border-radius:18px;

margin:10px 0;

}



.rating{

text-align:center;

color:#ffd700;

font-size:25px;

margin-top:25px;

}



.note{

text-align:center;

font-size:12px;

color:#aaa;

}

</style>

</head>

<body>


<div class="heart" style="left:15%">💖</div>
<div class="heart" style="left:50%;animation-delay:2s">💜</div>
<div class="heart" style="left:80%;animation-delay:4s">💖</div>



<div class="box">


<img class="image"
src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=900">


<div class="tag">
🔥 تعارف وشات
</div>


<h1>
💖 تعرّف على أشخاص جدد
<span>وابدأ محادثتك الآن</span>
</h1>


<p class="text">
اكتشف مجتمعًا جديدًا، كوّن صداقات، وتواصل مع أشخاص يشاركونك نفس الاهتمامات. التسجيل سريع وسهل.
</p>



<div class="form">

<label>
📱 اكتب رقم هاتفك للانضمام
</label>

<input type="tel" placeholder="05XXXXXXXX">



<button onclick="go()">
ابدأ الآن ❤️
</button>


</div>




<div class="features">

<div class="item">
💬 محادثات خاصة
</div>

<div class="item">
⚡ تسجيل سريع خلال دقائق
</div>

<div class="item">
🔒 خصوصية وأمان
</div>

<div class="item">
✨ تجربة مصممة للموبايل
</div>

</div>



<div class="rating">
⭐⭐⭐⭐⭐
</div>


<p class="note">
بالضغط على الزر تنتقل إلى صفحة التسجيل
</p>


</div>



<script>

function go(){

window.location.href=
"https://adsone.leadseagle.shop/?utm_medium=ad91ef12cbc61028dd54bd1f95ec531c80b2da20&utm_campaign=medoads1";

}

</script>


</body>
</html>
