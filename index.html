body{

.badge{

height:65px;
border-radius:50%;

}

.online{
color:#35ff8b;
margin-top:5px;

.box{
margin-top:20px;
}

input{
width:100%;
padding:17px;
border:0;
border-radius:20px;
font-size:17px;
text-align:center;
}

button{
width:100%;
margin-top:15px;
padding:18px;
border:0;
border-radius:50px;
background:linear-gradient(45deg,#ff006f,#ff70bb);
color:#fff;
font-size:22px;
font-weight:bold;
box-shadow:0 0 30px #ff006f;
}

.feature{
background:#ffffff12;
padding:14px;
border-radius:18px;
margin:10px 0;

.stars{
text-align:center;
